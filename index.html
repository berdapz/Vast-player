<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>VAST Player</title>

  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

  <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-contrib-ads/6.9.0/videojs.ads.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-ima/1.11.0/videojs.ima.min.js"></script>

  <style>
    body { margin:0; background:black; }
    .video-js { width:100vw; height:100vh; }
  </style>
</head>

<body>

<video
  id="video"
  class="video-js vjs-default-skin"
  controls
  autoplay
  muted
  playsinline
></video>

<script>
  var player = videojs('video');

  player.ima({
    adTagUrl: "https://test-pub.lmx.ai/ssp-project/api/v2/rest/dv/a?refId=MYS-MOV-D-00000-10431&deal=GD-00000-02318&lineItemId=64b4dcb18c5bc71769290562"
  });

  player.ready(function () {
    player.ima.initializeAdDisplayContainer();
    player.ima.requestAds();
    player.play();
  });
</script>

</body>
</html>
